import requests
import urllib3

# Desactivar advertencias de certificados (por el error SSL que te salía)
urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

# CONFIGURACIÓN
URL_FUENTE = "http://memondo.sviportdaey.top:8080/get.php?username=Barea250912&password=HUGRGY3&type=m3u_plus"
ARCHIVO_FINAL = "WALTERTV_LLENO.m3u"

# Encabezados para parecer un reproductor real
HEADERS = {
    'User-Agent': 'Mozilla/5.0 (SmartHub; SmartTV; 2013; Linux/SmartTV) AppleWebKit/537.11 (KHTML, like Gecko) TV Safari/537.11'
}

def descargar_y_limpiar():
    print(f"--- Iniciando extracción desde fuente externa ---")
    
    try:
        # Realizar la petición (sin verificar SSL y con headers de TV)
        response = requests.get(URL_FUENTE, headers=HEADERS, verify=False, timeout=30)
        
        if response.status_code == 200:
            # Dividir el contenido por líneas y limpiar espacios
            lineas = response.text.splitlines()
            
            canales_encontrados = []
            
            # Recorrer las líneas buscando la estructura de IPTV
            # i = etiqueta (#EXTINF), i+1 = link (http://...)
            for i in range(len(lineas)):
                if lineas[i].startswith("#EXTINF"):
                    # Verificamos que exista una línea siguiente y que sea un link
                    if i + 1 < len(lineas) and lineas[i+1].startswith("http"):
                        canales_encontrados.append(lineas[i])   # Info del canal
                        canales_encontrados.append(lineas[i+1]) # URL del streaming
            
            # Guardar el resultado
            with open(ARCHIVO_FINAL, "w", encoding="utf-8") as f:
                f.write("#EXTM3U\n") # Encabezado obligatorio
                for linea in canales_encontrados:
                    f.write(linea + "\n")
            
            total = len(canales_encontrados) // 2
            print(f"--- ¡ÉXITO! ---")
            print(f"Se extrajeron {total} canales correctamente.")
            print(f"Archivo guardado como: {ARCHIVO_FINAL}")
            
        else:
            print(f"Error: El servidor respondió con código {response.status_code}")
            if response.status_code == 401:
                print("Nota: El usuario o contraseña parecen haber expirado.")

    except Exception as e:
        print(f"Ocurrió un error técnico: {e}")

if __name__ == "__main__":
    descargar_y_limpiar()

